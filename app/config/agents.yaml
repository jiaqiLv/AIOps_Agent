agents:
  supervisor:
    name: supervisor
    type: plan_execute
    workflow: plan_execute
    state_schema: app.models.plan_execute_state.PlanExecuteState
    system_prompt: app/prompts/supervisor_planner.md
    model:
      provider: deepseek
      name: deepseek-chat
      temperature: 0

  detection:
    name: detection
    type: react_agent
    workflow: react_tool_loop
    state_schema: app.models.detection_agent_state.DetectionAgentState
    system_prompt: app/prompts/detection_system.md
    first_iteration_instruction: "请从任务描述中提取 data_path，调用 csv_reader_tool 加载数据。加载成功后调用 bld_metric_tool 进行异常检测。"
    tools:
      - csv_reader_tool
      - bld_metric_tool
    model:
      provider: deepseek
      name: deepseek-chat
      temperature: 0
    max_iterations: 5

  diagnose:
    name: diagnose
    type: react_agent
    workflow: react_tool_loop
    state_schema: app.models.react_agent_state.ReactAgentState
    system_prompt: app/prompts/diagnose_system.md
    tools:
      - csv_reader_tool
      - rcd_tool
      - pc_tool
      - graph_visualization_tool
    model:
      provider: deepseek
      name: deepseek-chat
      temperature: 0
    max_iterations: 10
