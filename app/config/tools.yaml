tools:
  ask_user:
    name: ask_user
    description: 当工具参数缺失时请求用户补充信息
    module: app.tools.human_tool
    function: ask_user
    args_schema: AskUserInput
    return_schema: AskUserResult
    required_fields:
      - question

  csv_reader_tool:
    name: csv_reader_tool
    description: 读取 CSV 指标数据文件，返回包含所有指标列的 DataFrame 信息
    module: app.tools.csv_reader_tool
    function: read_csv_metrics
    args_schema: CsvReaderInput
    return_schema: CsvReaderResult
    required_fields:
      - data_path

  rcd_tool:
    name: rcd_tool
    description: 调用 IAF-RCL 快速根因推理算法，基于故障注入时间识别候选根因指标
    module: app.tools.rcd_wrapper
    function: run_rcd_analysis
    args_schema: RcdInput
    return_schema: AlgorithmResult
    required_fields:
      - data
      - inject_time

  pc_tool:
    name: pc_tool
    description: 调用 KE-FPC 算法进行根因推理和故障传播图建模，基于异常 KPI 指标进行因果发现
    module: app.tools.pc_wrapper
    function: run_pc_analysis
    args_schema: PcInput
    return_schema: AlgorithmResult
    required_fields:
      - data

  three_sigma_tool:
    name: three_sigma_tool
    description: 使用3-sigma算法检测异常指标，取故障时间前1小时到前30分钟数据建立基线(μ/σ)，在故障时间前后10分钟区间内检测异常
    module: app.tools.three_sigma
    function: run_three_sigma
    args_schema: ThreeSigmaInput
    return_schema: AlgorithmResult
    required_fields:
      - inject_time

  bld_metric_tool:
    name: bld_metric_tool
    description: 使用BLD Metric算法(ECOD)进行异常检测，取前N小时数据训练模型，检测后续数据中的异常指标
    module: app.tools.bld_metric_wrapper
    function: run_bld_metric_detection
    args_schema: BldMetricInput
    return_schema: AlgorithmResult
    required_fields: []

  graph_visualization_tool:
    name: graph_visualization_tool
    description: 生成故障传播图的可视化展示，用不同颜色区分KPI节点和根因节点
    module: app.tools.graph_visualization_tool
    function: visualize_propagation_graph
    args_schema: GraphVisualizationInput
    return_schema: GraphVisualizationResult
    required_fields:
      - edges
      - root_causes
