# ZH Dataset Configuration

context:
  dataset_name: "zh_dataset"
  case_name: "zh_dataset"
  sample_name: "1116"

data_loading:
  type: "csv"
  path: "data/raw/{dataset_name}/{case_name}/{sample_name}/data.csv"
  timestamp_column: "time"

preprocessing:
  output_path: "data/processed/{dataset_name}/{sample_name}/data_processed.csv"
  save_correlation_matrix: true
  processors:
    missing_values:
      enabled: true
      method: "ffill_then_zero"
    constant_filter:
      enabled: true
      variance_threshold: 0
    wavelet_denoise:
      enabled: true
      wavelet: "db4"
      level: 1
    correlation_filter:
      enabled: true
      threshold: 0.999

knowledge:
  constraints_path: "config/constraints.yaml"
  use_level_constraints: true  # Set to false for ablation study

algorithm:
  name: "pc"
  output_dir: "data/output/{dataset_name}/{sample_name}/intermediate"
  params:
    alpha: 0.05
    indep_test: "fisherz"
    stable: true
    uc_rule: 0
    uc_priority: 2
    max_conditioning_corr: 0.95

orientation:
  max_iterations: 100
  time_lag:
    enabled: true
    max_lag: 5
    correlation_threshold: 0.3
  igci:
    enabled: true
    sample_size: 1000
    entropy_threshold: 0.01

rca:
  enabled: true
  performance_metric: null
  max_shift: 1
  max_width: 2
  shift_penalty: 0.004
  smooth_penalty: 0.01
  min_similarity: 0.5
  max_path_length: 10

evaluation:
  enabled: false

output:
  base_dir: "data/output/{dataset_name}/{sample_name}"
  save_intermediate: true

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/zh_causal_discovery.log"